      # =====================================================
      # Generate release.sql Using Python
      # =====================================================

      - name: Generate release.sql
        shell: powershell
        run: |

          $pythonCandidates = @(
            "C:\Users\Lenovo\AppData\Local\Microsoft\WindowsApps\python.exe",
            "C:\Users\Lenovo\AppData\Local\Python\bin\python.exe"
          )

          $pythonPath = $null

          foreach ($candidate in $pythonCandidates) {
            if (Test-Path $candidate) {
              $pythonPath = $candidate
              break
            }
          }

          if (-not $pythonPath) {
            throw "Python executable was not found. Checked: $($pythonCandidates -join ', ')"
          }

          Write-Host "Using Python: $pythonPath"

          & $pythonPath database/app_schema/scripts/generate_release.py

          Write-Host ""
          Write-Host "===== GENERATED release.sql ====="

          Get-Content release.sql

      # =====================================================
      # Execute Deployment
      # =====================================================

      - name: Execute release.sql
        shell: powershell
        run: |

          @"
          CONNECT $env:DB_USER/$env:DB_PASSWORD@$env:DB_CONNECT

          SET ECHO ON
          SET SERVEROUTPUT ON

          @release.sql

          EXIT;
          "@ | Out-File run_release.sql -Encoding ascii

          Write-Host ""
          Write-Host "===== run_release.sql ====="

          Get-Content run_release.sql

