name: Database Validation

on:
    pull_request:
        branches:
        - develop
        - qa
        - main

permissions:
  contents: read


jobs:
    validate-db:
        runs-on: self-hosted
        steps:
        - name: Checkout Repository
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.12'

        - name: Show Changed Files
          shell: bash
          run: |

            echo ""
            echo "===== CHANGED FILES ====="

            git diff --name-only \
            origin/${{ github.base_ref }} \
            HEAD

        - name: Validate Structural Object Modifications
          shell: bash
          run: |

            echo ""
            echo "===== STRUCTURAL OBJECT VALIDATION ====="

            restrictedFolders=(
            "tables/"
            "constraints/"
            "indexes/"
            "sequences/"
            )

            changedFiles=$(git diff --name-only \
            origin/${{ github.base_ref }} \
            HEAD)

            while IFS= read -r file; do

            for folder in "${restrictedFolders[@]}"; do

                if [[ "$file" == database/app_schema/$folder* ]]; then

                if git cat-file -e \
                    "origin/${{ github.base_ref }}:$file" \
                    2>/dev/null; then

                    echo ""
                    echo "ERROR:"
                    echo "Existing structural object modified."
                    echo "$file"
                    echo ""
                    echo "Use changes/ folder instead."
                    echo ""

                    exit 1

                fi

                fi

            done

            done <<< "$changedFiles"

            echo ""
            echo "Validation Passed"

        - name: Validate Folder Structure
          shell: bash
          run: |

            echo ""
            echo "===== FOLDER VALIDATION ====="

            allowedFolders=(
            "tables"
            "constraints"
            "sequences"
            "indexes"
            "triggers"
            "views"
            "functions"
            "procedures"
            "packages"
            "seed_data"
            "changes"
            "rollback"
            )

            changedFiles=$(git diff --name-only \
            origin/${{ github.base_ref }} \
            HEAD)

            while IFS= read -r file; do

            if [[ "$file" == *.sql ]]; then

                objectFolder=$(echo "$file" | cut -d'/' -f3)

                if [[ ! " ${allowedFolders[*]} " =~ " ${objectFolder} " ]]; then

                echo ""
                echo "Invalid Folder:"
                echo "$file"
                echo ""

                exit 1

                fi

            fi

            done <<< "$changedFiles"

            echo ""
            echo "Folder Validation Passed"

        
        - name: Generate release.sql
          shell: bash
          run: |

            python3 database/app_schema/scripts/generate_release.py


        - name: Show release.sql
          shell: bash
          run: |

            echo ""
            echo "===== GENERATED release.sql ====="

            cat release.sql

        - name: Validate release.sql
          shell: bash
          run: |

            if [ ! -f release.sql ]; then

            echo "release.sql not generated."

            exit 1

            fi

            if [ ! -s release.sql ]; then

            echo "release.sql is empty."

            exit 1

            fi

            echo ""
            echo "release.sql validation passed."

 
        - name: Validation Complete
          shell: bash
          run: |

            echo ""
            echo "======================================"
            echo "DATABASE VALIDATION PASSED"
            echo "======================================"

