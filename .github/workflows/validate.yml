name: Database Validation

on:

  pull_request:

    branches:
      - develop
      - qa
      - main

# Cancel the in-progress validation run when a new commit is pushed to the PR.
concurrency:
  group: validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:

  DB_URL: ${{ secrets.DB_URL }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DEPLOY_MODE: VALIDATION

jobs:

  validate-db:

    runs-on: self-hosted

    steps:

    # =====================================================
    # Checkout Repository
    # =====================================================

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # =====================================================
    # Setup Python
    # =====================================================

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # =====================================================
    # Configure Oracle Environment
    # =====================================================

    - name: Configure Oracle Environment
      shell: bash
      run: |

        echo "/opt/oracle/instantclient_21_9" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=/opt/oracle/instantclient_21_9:$LD_LIBRARY_PATH" >> $GITHUB_ENV

        # echo "LD_LIBRARY_PATH=/opt/oracle/instantclient_21_9" >> $GITHUB_ENV

    # =====================================================
    # Verify SQLPlus
    # =====================================================

    - name: Verify SQLPlus
      shell: bash
      run: |

        which sqlplus

        sqlplus -V

    # =====================================================
    # Convert JDBC URL
    # =====================================================

    - name: Convert JDBC URL
      shell: bash
      run: |

        DB_CONNECT=$(echo "$DB_URL" | sed 's#jdbc:oracle:thin:@##')

        echo "DB_CONNECT=$DB_CONNECT" >> $GITHUB_ENV

    # =====================================================
    # Verify Oracle Login
    # =====================================================

    - name: Verify Oracle Login
      shell: bash
      run: |

        cat > verify.sql <<EOF

        CONNECT $DB_USER/$DB_PASSWORD@$DB_CONNECT

        PROMPT
        PROMPT ===== CONNECTED USER =====

        SELECT USER FROM DUAL;

        EXIT;

        EOF

        sqlplus -s /nolog @verify.sql

    # =====================================================
    # Show Changed Files
    # =====================================================

    - name: Show Changed Files
      shell: bash
      run: |

        echo "===== CHANGED FILES ====="

        git diff --name-only \
          origin/${{ github.base_ref }} \
          HEAD

    # =====================================================
    # Structural Validation
    # =====================================================

    - name: Validate Structural Object Modifications
      shell: bash
      run: |

        restrictedFolders=(
          "tables/"
          "constraints/"
          "indexes/"
          "sequences/"
        )

        changedFiles=$(git diff --name-only \
          origin/${{ github.base_ref }} \
          HEAD)

        while IFS= read -r file; do

          for folder in "${restrictedFolders[@]}"; do

            if [[ "$file" == database/app_schema/$folder* ]]; then

              if git cat-file -e \
                "origin/${{ github.base_ref }}:$file" \
                2>/dev/null; then

                echo ""
                echo "ERROR: Existing structural object modified"
                echo "$file"
                echo ""
                echo "Create a change script under changes/"
                exit 1

              fi

            fi

          done

        done <<< "$changedFiles"

    # =====================================================
    # Folder Validation
    # =====================================================

    - name: Validate Folder Structure
      shell: bash
      run: |

        allowedFolders=(
          tables
          constraints
          sequences
          indexes
          triggers
          views
          functions
          procedures
          packages
          seed_data
          changes
          rollback
          grants
          synonyms
        )

        changedFiles=$(git diff --name-only \
          origin/${{ github.base_ref }} \
          HEAD)

        while IFS= read -r file; do

          if [[ "$file" == *.sql ]]; then

            folder=$(echo "$file" | cut -d'/' -f3)

            if [[ ! " ${allowedFolders[*]} " =~ " ${folder} " ]]; then

              echo "Invalid folder: $file"

              exit 1

            fi

          fi

        done <<< "$changedFiles"

    # =====================================================
    # Naming Validation
    # =====================================================

    - name: Validate Naming Standards
      shell: bash
      run: |

        changedFiles=$(git diff --name-only \
          origin/${{ github.base_ref }} \
          HEAD)

        while IFS= read -r file; do

          filename=$(basename "$file")

          case "$file" in

            database/app_schema/indexes/*)

              [[ "$filename" =~ ^idx_ ]] || {
                echo "Invalid index name: $filename"
                exit 1
              }
              ;;

            database/app_schema/constraints/*)

              [[ "$filename" =~ ^(pk_|fk_|uk_|ck_) ]] || {
                echo "Invalid constraint name: $filename"
                exit 1
              }
              ;;

          esac

        done <<< "$changedFiles"

    # =====================================================
    # Rollback Validation
    # =====================================================

    - name: Validate Rollback Scripts
      shell: bash
      run: |

        changedFiles=$(git diff --name-only \
          origin/${{ github.base_ref }} \
          HEAD)

        while IFS= read -r file; do

          if [[ "$file" == database/app_schema/changes/*.sql ]]; then

            base=$(basename "$file" .sql)

            rollback="database/app_schema/rollback/${base}_rollback.sql"

            if [ ! -f "$rollback" ]; then

              echo "Rollback missing"

              echo "$rollback"

              exit 1

            fi

          fi

        done <<< "$changedFiles"

    # =====================================================
    # Dangerous SQL Validation
    #
    # Tier 1 — Absolute block in ALL folders:
    #   DROP USER, DROP TABLESPACE, ALTER SYSTEM,
    #   DROP DATABASE LINK, DROP ROLE
    #
    # Tier 2 — Block in definition folders only
    #   (tables/ constraints/ indexes/ sequences/)
    #   DROP TABLE, TRUNCATE TABLE are allowed in changes/
    #   because corrections may require table rebuilds.
    # =====================================================

    - name: Validate Dangerous Statements
      shell: bash
      run: |

        changedFiles=$(git diff --name-only \
          origin/${{ github.base_ref }} \
          HEAD)

        while IFS= read -r file; do

          if [[ "$file" == *.sql ]]; then

            # Tier 1 — blocked everywhere, no exceptions
            if grep -Eiq \
            "DROP USER|DROP TABLESPACE|ALTER SYSTEM|DROP DATABASE LINK|DROP ROLE" \
            "$file"; then

              echo "ERROR: Absolutely prohibited statement found in: $file"
              exit 1

            fi

            # Tier 2 — blocked only in definition folders, allowed in changes/
            if [[ "$file" != database/app_schema/changes/* ]]; then

              if grep -Eiq \
              "DROP TABLE|TRUNCATE TABLE" \
              "$file"; then

                echo "ERROR: DROP TABLE / TRUNCATE TABLE not allowed in $file"
                echo "Use a change script under changes/ for table corrections"
                exit 1

              fi

            fi

          fi

        done <<< "$changedFiles"

    # =====================================================
    # Generate release.sql
    # =====================================================

    - name: Generate release.sql
      shell: bash
      run: |

        python3 database/app_schema/scripts/generate_release.py

    # =====================================================
    # Show release.sql
    # =====================================================

    - name: Show release.sql
      shell: bash
      run: |

        echo "===== GENERATED release.sql ====="

        cat release.sql

    # =====================================================
    # Validate release.sql
    # =====================================================

    - name: Validate release.sql
      shell: bash
      run: |

        [ -f release.sql ] || exit 1

        [ -s release.sql ] || exit 1

    # =====================================================
    # Capture Invalid Count Before Deployment
    # =====================================================

    - name: Capture Invalid Count Before
      shell: bash
      run: |

        cat > invalid_before.sql <<EOF
        SET HEADING OFF
        SET FEEDBACK OFF

        SELECT COUNT(*)
        FROM user_objects
        WHERE status='INVALID';

        EXIT;
        EOF

        BEFORE_COUNT=$(
          sqlplus -s \
          "$DB_USER/$DB_PASSWORD@$DB_CONNECT" \
          @invalid_before.sql
        )

        BEFORE_COUNT=$(echo "$BEFORE_COUNT" | tr -d '[:space:]')

        echo "BEFORE_COUNT=$BEFORE_COUNT" >> $GITHUB_ENV

    # =====================================================
    # Deploy Validation
    # =====================================================

    # - name: Deploy To Validation Schema
    #   shell: bash
    #   run: |

    #     cat > validate.sql <<EOF

    #     CONNECT $DB_USER/$DB_PASSWORD@$DB_CONNECT

    #     WHENEVER SQLERROR EXIT FAILURE

    #     @release.sql

    #     EXIT;
    #     EOF

    #     sqlplus -s /nolog @validate.sql

    # =====================================================
    # Compile Schema
    # =====================================================

    - name: Compile Schema
      shell: bash
      run: |

        cat > compile.sql <<EOF

        BEGIN
          DBMS_UTILITY.compile_schema(
            schema => '$DB_USER'
          );
        END;
        /
        EXIT;
        EOF

        sqlplus -s \
        "$DB_USER/$DB_PASSWORD@$DB_CONNECT" \
        @compile.sql

    # =====================================================
    # Validate Invalid Objects
    # =====================================================

    - name: Validate Invalid Objects
      shell: bash
      run: |

        cat > invalid_after.sql <<EOF

        SET HEADING OFF
        SET FEEDBACK OFF

        SELECT COUNT(*)
        FROM user_objects
        WHERE status='INVALID';

        EXIT;

        EOF

        AFTER_COUNT=$(
          sqlplus -s \
          "$DB_USER/$DB_PASSWORD@$DB_CONNECT" \
          @invalid_after.sql
        )

        AFTER_COUNT=$(echo "$AFTER_COUNT" | tr -d '[:space:]')

        echo "Before = $BEFORE_COUNT"
        echo "After  = $AFTER_COUNT"

        if [ "$AFTER_COUNT" -gt "$BEFORE_COUNT" ]; then

          echo "New invalid objects detected."

          exit 1

        fi

    # =====================================================
    # Validation Success
    # =====================================================

    - name: Validation Complete
      shell: bash
      run: |

        echo ""
        echo "===================================="
        echo "DATABASE VALIDATION PASSED"
        echo "===================================="


