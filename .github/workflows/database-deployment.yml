      # =====================================================
      # Execute Deployment
      # =====================================================

      - name: Execute release.sql
        shell: powershell
        run: |

          @"
          CONNECT $env:DB_USER/$env:DB_PASSWORD@$env:DB_CONNECT

          SET ECHO ON
          SET SERVEROUTPUT ON

          @release.sql

          EXIT;
          "@ | Out-File run_release.sql -Encoding ascii

          Write-Host ""
          Write-Host "===== run_release.sql ====="

          Get-Content run_release.sql

          sqlplus /nolog "@run_release.sql"

      # =====================================================
      # Create Deployment Lock On Failure
      # =====================================================

      - name: Create Deployment Lock
        if: failure()
        shell: powershell
        run: |

          New-Item `
            -Path "deployment.lock" `
            -ItemType File `
            -Force

          @"
          =================================================
          DEPLOYMENT FAILED
          =================================================

          Branch:
          ${{ github.ref_name }}

          Commit:
          ${{ github.sha }}

          Workflow:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Partial deployment may exist.

          Manual intervention required.
          "@ | Out-File deployment.lock

          Write-Host ""
          Write-Host "Deployment lock created."
          
