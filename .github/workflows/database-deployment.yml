name: DB Deployment

on:
  push:
    branches:
      - develop
      - qa
      - main

jobs:

  deploy-db:

    runs-on: self-hosted

    environment: PROD

    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_CONNECT: "localhost:1521/XEPDB1"

    steps:

      # =====================================================
      # Checkout Repository
      # =====================================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =====================================================
      # Debug Environment Selection
      # =====================================================

      - name: Debug Environment Selection
        shell: powershell
        run: |

          Write-Host "Branch Name = ${{ github.ref_name }}"

          if ("${{ github.ref_name }}" -eq "develop") {
            Write-Host "Matched DEV environment"
          }
          elseif ("${{ github.ref_name }}" -eq "qa") {
            Write-Host "Matched QA environment"
          }
          elseif ("${{ github.ref_name }}" -eq "main") {
            Write-Host "Matched PROD environment"
          }
          else {
            Write-Host "No branch match found"
          }

          if ($env:DB_URL) {
            Write-Host "DB_URL exists"
          }
          else {
            Write-Host "DB_URL missing"
            exit 1
          }



      # =====================================================
      # Validate Structural Object Modifications
      # =====================================================
      - name: Validate Structural Object Modifications
        shell: powershell
        run: |

          $restrictedFolders = @(
            "tables/",
            "constraints/",
            "indexes/",
            "sequences/"
          )

          $changedFiles = git diff --name-only `
            ${{ github.event.before }} `
            ${{ github.sha }}

          foreach ($file in $changedFiles) {

            foreach ($folder in $restrictedFolders) {

              if ($file -like "*$folder*") {

                # ============================================
                # Check If File Already Existed
                # ============================================

                git cat-file -e "${{ github.event.before }}:$file" 2>$null

                if ($LASTEXITCODE -eq 0) {

                  Write-Host ""
                  Write-Host "ERROR:"
                  Write-Host "Existing structural object modified -> $file"
                  Write-Host ""
                  Write-Host "Do NOT modify deployed structural objects."
                  Write-Host "Create separate ALTER/change script instead."
                  Write-Host ""

                  exit 1
                }
              }
            }
          }

          Write-Host ""
          Write-Host "Structural object validation successful."

      # =====================================================
      # Generate release.sql From manifest.yml
      # =====================================================

      - name: Generate Differential release.sql
        shell: powershell
        run: |

          $manifestPath = "database/app_schema/deployment/manifest.yml"
          $releaseFile = "release.sql"

          if (Test-Path $releaseFile) {
            Remove-Item $releaseFile
          }

          New-Item `
            -Path $releaseFile `
            -ItemType File `
            -Force

          # =====================================================
          # Get Changed Files
          # =====================================================

          if ("${{ github.event.before }}" -eq "0000000000000000000000000000000000000000") {

            Write-Host "Initial deployment detected."

            $changedFiles = git ls-files
          }
          else {

            $changedFiles = git diff --name-only `
              ${{ github.event.before }} `
              ${{ github.sha }}
          }

          Write-Host "===== CHANGED FILES ====="

          $changedFiles | ForEach-Object {
            Write-Host $_
          }

          # =====================================================
          # Read Manifest
          # =====================================================

          $manifestLines = Get-Content $manifestPath

          foreach ($line in $manifestLines) {

            if ($line -match "^\s*-\s*(.*)") {

              $manifestFile = $matches[1].Trim()

              $fullPath = "database/app_schema/$manifestFile"

              # =====================================================
              # Include Only Changed Files
              # =====================================================

              if ($changedFiles -contains $fullPath) {

                Add-Content `
                  -Path $releaseFile `
                  -Value "@@$fullPath"

                Write-Host "Added To release.sql -> $fullPath"
              }
            }
          }

          Write-Host "===== GENERATED release.sql ====="

          Get-Content $releaseFile

