name: DB Deployment

on:
  push:
    branches:
      - develop
      - qa
      - main

jobs:

  deploy-db:

    runs-on: self-hosted

    environment:
      name: ${{ github.ref_name == 'main' && 'PROD' || github.ref_name == 'qa' && 'QA' || 'DEV' }}

    env:
      DB_CONNECT: ${{ secrets.DB_CONNECT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:

      # =====================================================
      # Checkout Repository
      # =====================================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =====================================================
      # Debug Branch And Environment
      # =====================================================

      - name: Debug Environment
        shell: powershell
        run: |

          Write-Host "Branch Name = ${{ github.ref_name }}"
          Write-Host "Environment = ${{ job.environment.name }}"

          if ($env:DB_CONNECT) {
            Write-Host "DB_CONNECT exists"
          }
          else {
            Write-Host "DB_CONNECT missing"
            exit 1
          }

          if ($env:DB_USER) {
            Write-Host "DB_USER exists"
          }
          else {
            Write-Host "DB_USER missing"
            exit 1
          }

          if ($env:DB_PASSWORD) {
            Write-Host "DB_PASSWORD exists"
          }
          else {
            Write-Host "DB_PASSWORD missing"
            exit 1
          }

      # =====================================================
      # Generate release.sql From manifest.yml
      # =====================================================

      - name: Generate release.sql
        shell: powershell
        run: |

          $manifestPath = "database/app_schema/deployment/manifest.yml"
          $releaseFile = "release.sql"

          if (Test-Path $releaseFile) {
            Remove-Item $releaseFile
          }

          New-Item `
            -Path $releaseFile `
            -ItemType File `
            -Force

          $lines = Get-Content $manifestPath

          foreach ($line in $lines) {

            if ($line -match "^\s*-\s*(.*)") {

              $file = $matches[1].Trim()

              Add-Content `
                -Path $releaseFile `
                -Value "@@database/app_schema/$file"
            }
          }

          Write-Host "===== GENERATED release.sql ====="

          Get-Content $releaseFile

      # =====================================================
      # Execute Deployment
      # =====================================================

      - name: Execute release.sql
        shell: powershell
        run: |

          sqlplus `
            $env:DB_USER/$env:DB_PASSWORD@$env:DB_CONNECT `
            @release.sql

