name: DB Deployment

on:
  push:
    branches:
      - main

jobs:

  deploy-db:

    runs-on: self-hosted

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Migration Files
        shell: powershell
        run: |
          dir "${{ github.workspace }}\database\migrations"

      - name: Run Flyway Migration
        shell: powershell
        run: |

          docker run --rm `
            -v "${{ github.workspace }}\database\migrations:/flyway/sql" `
            flyway/flyway `
            -url=jdbc:oracle:thin:@host.docker.internal:1521/XEPDB1 `
            -user=APP_USER `
            -password=app123 `
            migrate