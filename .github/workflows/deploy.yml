name: Oracle DB Deployment

on:
  push:
    branches:
      - develop
      - qa
      - main
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: 'DEPLOYMENT = this PR only | RECONCILE = all pending files'
        required: true
        default: 'RECONCILE'
        type: choice
        options:
          - RECONCILE
          - DEPLOYMENT

permissions:
  contents: read
  id-token: write

# Prevent concurrent deployments to the same branch/environment.
# cancel-in-progress: false queues the next run instead of cancelling it.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:

  deploy-db:

    runs-on: self-hosted

    environment:
      name: ${{ github.ref_name == 'main' && 'PROD' || github.ref_name == 'qa' && 'QA' || 'DEV' }}

    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DEPLOY_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_mode || 'DEPLOYMENT' }}
      LOCK_TABLE: DB_DEPLOYMENT_LOCK
      HISTORY_TABLE: DB_DEPLOYMENT_HISTORY

    steps:

    # =====================================================
    # Checkout Repository
    # =====================================================

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # =====================================================
    # Setup Python
    # =====================================================

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # =====================================================
    # Configure Oracle Environment
    # =====================================================

    - name: Configure Oracle Environment
      shell: bash
      run: |

        echo "/opt/oracle/instantclient_21_9" >> $GITHUB_PATH
        # echo "LD_LIBRARY_PATH=/opt/oracle/instantclient_21_9" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=/opt/oracle/instantclient_21_9:$LD_LIBRARY_PATH" >> $GITHUB_ENV

    # =====================================================
    # Verify SQLPlus
    # =====================================================

    - name: Verify SQLPlus
      shell: bash
      run: |

        which sqlplus
        sqlplus -V

    # =====================================================
    # Configure AWS Credentials
    # =====================================================

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE }}
        aws-region: us-east-1

    # =====================================================
    # Verify AWS Access
    # =====================================================

    - name: Verify AWS Access
      shell: bash
      run: |

        aws sts get-caller-identity

        echo ""
        echo "===== DYNAMODB TABLES ====="

        aws dynamodb list-tables

    # =====================================================
    # Convert JDBC URL
    # =====================================================

    - name: Convert JDBC URL
      shell: bash
      run: |

        DB_CONNECT=$(echo "$DB_URL" | sed 's#jdbc:oracle:thin:@##')

        echo "DB_CONNECT=$DB_CONNECT" >> $GITHUB_ENV

    # =====================================================
    # Resolve Environment Name
    # =====================================================

    - name: Set Environment Name
      shell: bash
      run: |

        case "${{ github.ref_name }}" in
          main)    echo "ENV_NAME=PROD" >> $GITHUB_ENV ;;
          qa)      echo "ENV_NAME=QA"   >> $GITHUB_ENV ;;
          develop) echo "ENV_NAME=DEV"  >> $GITHUB_ENV ;;
          *)
            echo "Unknown branch: ${{ github.ref_name }}"
            exit 1
            ;;
        esac

    # =====================================================
    # Check Deployment Lock
    # =====================================================

    - name: Check Deployment Lock
      shell: bash
      run: |

        echo ""
        echo "===== CHECKING DEPLOYMENT LOCK ====="

        LOCK_STATUS=$(aws dynamodb get-item \
          --table-name $LOCK_TABLE \
          --key '{"environment":{"S":"'"$ENV_NAME"'"}}' \
          --query 'Item.status.S' \
          --output text 2>/dev/null || echo "UNLOCKED")

        echo "Lock Status = $LOCK_STATUS"

        if [ "$LOCK_STATUS" = "LOCKED" ]; then

          echo "Deployment blocked."

          exit 1

        fi

    # =====================================================
    # Generate deployment files
    # =====================================================

    - name: Generate Deployment Files
      shell: bash
      run: |

        python3 database/app_schema/scripts/generate_release.py

        echo ""
        echo "===== deployment_list.txt ====="

        cat deployment_list.txt

        echo ""
        echo "===== release.sql ====="

        cat release.sql

    # =====================================================
    # Extract PR Number
    # =====================================================

    - name: Extract PR Number
      shell: bash
      run: |

        COMMIT_MSG=$(git log -1 --pretty=%B)

        PR_NUMBER=$(echo "$COMMIT_MSG" \
          | sed -n 's/.*pull request #\([0-9]*\).*/\1/p' \
          | head -1)

        PR_NUMBER="${PR_NUMBER:-N/A}"

        echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
        echo "PR Number : $PR_NUMBER"

    # =====================================================
    # Verify Oracle Login
    # =====================================================

    - name: Verify Oracle Login
      shell: bash
      run: |

        cat > verify.sql <<EOF
        CONNECT $DB_USER/$DB_PASSWORD@$DB_CONNECT

        PROMPT
        PROMPT ===== CONNECTED USER =====

        SELECT USER FROM DUAL;

        EXIT;
        EOF

        sqlplus -s /nolog @verify.sql

    - name: Execute SQL Files
      shell: bash
      run: |

        DEPLOYED_COUNT=0
        TOTAL_SCRIPTS=$(grep -c . deployment_list.txt 2>/dev/null || echo "0")

        while read file
        do

        [ -z "$file" ] && continue

        SCRIPT_TYPE=$(echo "$file" | cut -d'/' -f3)
        SCRIPT_NAME=$(echo "$file" | sed 's|database/app_schema/||')

        echo ""
        echo "====================================="
        echo "Processing : $file"
        echo "====================================="

        # ------------------------------------
        # Check Deployment History
        # ------------------------------------

        STATUS=$(aws dynamodb get-item \
            --table-name $HISTORY_TABLE \
            --key '{
            "environment":{"S":"'"$ENV_NAME"'"},
            "deployment_record":{"S":"'"$file"'"}
            }' \
            --query 'Item.status.S' \
            --output text 2>/dev/null || echo "NONE")

        echo "History Status : $STATUS"

        if [ "$STATUS" = "SUCCESS" ]; then
            echo "Skipping already deployed file"
            continue
        fi

        # ------------------------------------
        # Execute SQL File
        # ------------------------------------

        cat > run_file.sql <<EOF

        CONNECT $DB_USER/$DB_PASSWORD@$DB_CONNECT

        WHENEVER SQLERROR EXIT FAILURE

        @$file

        EXIT;

        EOF

        SQL_OUTPUT=$(sqlplus -s /nolog @run_file.sql 2>&1)
        SQL_EXIT=$?

        if [ $SQL_EXIT -eq 0 ]; then

            echo "SUCCESS : $file"
            DEPLOYED_COUNT=$((DEPLOYED_COUNT + 1))

            aws dynamodb put-item \
            --table-name $HISTORY_TABLE \
            --item '{
                "environment":    {"S":"'"$ENV_NAME"'"},
                "deployment_record":{"S":"'"$file"'"},
                "deployment_batch":{"S":"${{ github.run_id }}"},
                "script_name":    {"S":"'"$SCRIPT_NAME"'"},
                "script_type":    {"S":"'"$SCRIPT_TYPE"'"},
                "branch":         {"S":"${{ github.ref_name }}"},
                "git_commit":     {"S":"${{ github.sha }}"},
                "pr_number":      {"S":"'"$PR_NUMBER"'"},
                "deployed_by":    {"S":"${{ github.actor }}"},
                "status":         {"S":"SUCCESS"},
                "error_message":  {"S":""},
                "deployed_on":    {"S":"'"$(date -u +%FT%TZ)"'"}
            }'

        else

            echo "FAILED : $file"
            echo "$SQL_OUTPUT"

            ERROR_MSG=$(echo "$SQL_OUTPUT" \
              | grep -iE "ORA-[0-9]+|SP2-[0-9]+" \
              | head -1 \
              | tr '"' "'" \
              | tr '\n' ' ' \
              | cut -c1-300)

            ERROR_MSG="${ERROR_MSG:-SQL execution failed}"

            aws dynamodb put-item \
            --table-name $HISTORY_TABLE \
            --item '{
                "environment":    {"S":"'"$ENV_NAME"'"},
                "deployment_record":{"S":"'"$file"'"},
                "deployment_batch":{"S":"${{ github.run_id }}"},
                "script_name":    {"S":"'"$SCRIPT_NAME"'"},
                "script_type":    {"S":"'"$SCRIPT_TYPE"'"},
                "branch":         {"S":"${{ github.ref_name }}"},
                "git_commit":     {"S":"${{ github.sha }}"},
                "pr_number":      {"S":"'"$PR_NUMBER"'"},
                "deployed_by":    {"S":"${{ github.actor }}"},
                "status":         {"S":"FAILED"},
                "error_message":  {"S":"'"$ERROR_MSG"'"},
                "deployed_on":    {"S":"'"$(date -u +%FT%TZ)"'"}
            }'

            aws dynamodb put-item \
            --table-name $LOCK_TABLE \
            --item '{
                "environment":   {"S":"'"$ENV_NAME"'"},
                "status":        {"S":"LOCKED"},
                "failed_script": {"S":"'"$file"'"},
                "failed_batch":  {"S":"${{ github.run_id }}"},
                "failed_commit": {"S":"${{ github.sha }}"},
                "failed_time":   {"S":"'"$(date -u +%FT%TZ)"'"},
                "error_message": {"S":"'"$ERROR_MSG"'"},
                "workflow_url":  {"S":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
            }'

            exit 1

        fi

        done < deployment_list.txt

        echo "DEPLOYED_COUNT=$DEPLOYED_COUNT" >> $GITHUB_ENV
        echo "TOTAL_SCRIPTS=$TOTAL_SCRIPTS"   >> $GITHUB_ENV

    # =====================================================
    # Compile Schema
    # =====================================================

    - name: Compile Schema
      if: success()
      shell: bash
      run: |

        cat > compile.sql <<EOF

        BEGIN
          DBMS_UTILITY.compile_schema(
            schema => '$DB_USER'
          );
        END;
        /
        EXIT;

        EOF

        sqlplus -s \
        "$DB_USER/$DB_PASSWORD@$DB_CONNECT" \
        @compile.sql

    # =====================================================
    # Validate Invalid Objects
    # =====================================================

    - name: Validate Invalid Objects
      if: success()
      shell: bash
      run: |

        cat > invalid.sql <<EOF

        SET HEADING OFF
        SET FEEDBACK OFF

        SELECT COUNT(*)
        FROM user_objects
        WHERE status='INVALID';

        EXIT;

        EOF

        COUNT=$(
          sqlplus -s \
          "$DB_USER/$DB_PASSWORD@$DB_CONNECT" \
          @invalid.sql
        )

        COUNT=$(echo "$COUNT" | tr -d '[:space:]')

        if [ "$COUNT" != "0" ]; then

          echo "Invalid objects detected"

          exit 1

        fi

    # =====================================================
    # Update Deployment History
    # =====================================================

    - name: Update Deployment History
      if: success()
      shell: bash
      run: |

        aws dynamodb put-item \
          --table-name $HISTORY_TABLE \
          --item '{
            "environment":      {"S":"'"$ENV_NAME"'"},
            "deployment_record":{"S":"DEPLOYMENT#${{ github.run_id }}#${{ github.sha }}"},
            "deployment_batch": {"S":"${{ github.run_id }}"},
            "branch":           {"S":"${{ github.ref_name }}"},
            "git_commit":       {"S":"${{ github.sha }}"},
            "pr_number":        {"S":"'"$PR_NUMBER"'"},
            "scripts_deployed": {"S":"'"$DEPLOYED_COUNT"'"},
            "deployed_by":      {"S":"${{ github.actor }}"},
            "status":           {"S":"SUCCESS"},
            "deployed_on":      {"S":"'"$(date -u +%FT%TZ)"'"}
          }'

    # =====================================================
    # Update Schema Version
    # =====================================================

    - name: Update Schema Version
      if: success()
      shell: bash
      run: |

        aws dynamodb put-item \
        --table-name $HISTORY_TABLE \
        --item '{
            "environment":      {"S":"'"$ENV_NAME"'"},
            "deployment_record":{"S":"SCHEMA_VERSION"},
            "deployment_batch": {"S":"${{ github.run_id }}"},
            "branch":           {"S":"${{ github.ref_name }}"},
            "git_commit":       {"S":"${{ github.sha }}"},
            "pr_number":        {"S":"'"$PR_NUMBER"'"},
            "scripts_deployed": {"S":"'"$DEPLOYED_COUNT"'"},
            "deployed_by":      {"S":"${{ github.actor }}"},
            "status":           {"S":"CURRENT"},
            "deployed_on":      {"S":"'"$(date -u +%FT%TZ)"'"}
        }'



    # =====================================================
    # Remove Deployment Lock
    # =====================================================

    - name: Remove Deployment Lock
      if: success()
      shell: bash
      run: |

        aws dynamodb put-item \
          --table-name $LOCK_TABLE \
          --item '{
            "environment":{"S":"'"$ENV_NAME"'"},
            "status":{"S":"UNLOCKED"},
            "resolved_time":{"S":"'"$(date -u +%FT%TZ)"'"}
          }'

    # =====================================================
    # Deployment Summary
    # =====================================================

    - name: Deployment Summary
      if: success()
      shell: bash
      run: |

        echo ""
        echo "======================================"
        echo "DEPLOYMENT SUCCESSFUL"
        echo "Environment : $ENV_NAME"
        echo "Branch      : ${{ github.ref_name }}"
        echo "Commit      : ${{ github.sha }}"
        echo "PR          : $PR_NUMBER"
        echo "Run Id      : ${{ github.run_id }}"
        echo "Deployed by : ${{ github.actor }}"
        echo "Scripts     : $DEPLOYED_COUNT deployed"
        echo "======================================"



