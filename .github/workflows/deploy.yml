name: Oracle DB Deployment

on:

  push:

    branches:
      - develop
      - qa
      - main

permissions:
  contents: read
  id-token: write

jobs:

  deploy-db:

    runs-on: self-hosted

    environment: PROD

    env:

      DB_URL: ${{ secrets.DB_URL }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      LOCK_TABLE: DB_DEPLOYMENT_LOCK
      HISTORY_TABLE: DB_DEPLOYMENT_HISTORY

    steps:

    # =====================================================
    # Checkout Repository
    # =====================================================

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # =====================================================
    # Configure Oracle Environment
    # =====================================================

    - name: Configure Oracle Environment
      shell: bash
      run: |

        echo "/opt/oracle/instantclient_21_9" >> $GITHUB_PATH

        echo "LD_LIBRARY_PATH=/opt/oracle/instantclient_21_9" >> $GITHUB_ENV

    # =====================================================
    # Verify SQLPlus
    # =====================================================

    - name: Verify SQLPlus
      shell: bash
      run: |

        which sqlplus

        sqlplus -V

    # =====================================================
    # Configure AWS Credentials
    # =====================================================

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::054276329279:role/github-actions-oidc-role
        aws-region: us-east-1

    # =====================================================
    # Setup Python
    # =====================================================

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # =====================================================
    # Convert JDBC URL
    # =====================================================

    - name: Convert JDBC URL
      shell: bash
      run: |

        DB_CONNECT=$(echo "$DB_URL" | sed 's#jdbc:oracle:thin:@##')

        echo "DB_CONNECT=$DB_CONNECT" >> $GITHUB_ENV

    # =====================================================
    # Check Deployment Lock
    # =====================================================

    - name: Check Deployment Lock
      shell: bash
      run: |

        ENV_NAME="PROD"

        LOCK_STATUS=$(aws dynamodb get-item \
          --table-name $LOCK_TABLE \
          --key '{"environment":{"S":"'"$ENV_NAME"'"}}' \
          --query 'Item.status.S' \
          --output text 2>/dev/null || echo "UNLOCKED")

        echo "Lock Status = $LOCK_STATUS"

        if [ "$LOCK_STATUS" = "LOCKED" ]; then

          echo "Deployment blocked."

          exit 1

        fi

    # =====================================================
    # Generate release.sql
    # =====================================================

    - name: Generate release.sql
      shell: bash
      run: |

        python3 database/app_schema/scripts/generate_release.py

        echo ""
        echo "===== GENERATED release.sql ====="

        cat release.sql

    # =====================================================
    # Verify Oracle Login
    # =====================================================

    - name: Verify Oracle Login
      shell: bash
      run: |

        cat > verify.sql <<EOF

        CONNECT $DB_USER/$DB_PASSWORD@$DB_CONNECT

        SELECT USER FROM DUAL;

        EXIT;

        EOF

        sqlplus -s /nolog @verify.sql

    # =====================================================
    # Execute Deployment
    # =====================================================

    - name: Execute Deployment
      id: deploy
      shell: bash
      run: |

        cat > run_release.sql <<EOF

        CONNECT $DB_USER/$DB_PASSWORD@$DB_CONNECT

        WHENEVER SQLERROR EXIT FAILURE

        SET ECHO ON
        SET SERVEROUTPUT ON

        @release.sql

        EXIT;

        EOF

        sqlplus -s /nolog @run_release.sql

    # =====================================================
    # Compile Schema
    # =====================================================

    - name: Compile Schema
      if: success()
      shell: bash
      run: |

        cat > compile.sql <<EOF

        BEGIN

          DBMS_UTILITY.compile_schema(
            schema => '$DB_USER'
          );

        END;
        /

        EXIT;

        EOF

        sqlplus -s \
        "$DB_USER/$DB_PASSWORD@$DB_CONNECT" \
        @compile.sql

    # =====================================================
    # Validate Invalid Objects
    # =====================================================

    - name: Validate Invalid Objects
      if: success()
      shell: bash
      run: |

        cat > invalid.sql <<EOF

        SET HEADING OFF
        SET FEEDBACK OFF

        SELECT COUNT(*)
        FROM user_objects
        WHERE status='INVALID';

        EXIT;

        EOF

        COUNT=$(
          sqlplus -s \
          "$DB_USER/$DB_PASSWORD@$DB_CONNECT" \
          @invalid.sql
        )

        COUNT=$(echo "$COUNT" | tr -d '[:space:]')

        if [ "$COUNT" != "0" ]; then

          echo "Invalid objects detected"

          exit 1

        fi

    # =====================================================
    # Update Deployment History
    # =====================================================

    - name: Update Deployment History
      if: success()
      shell: bash
      run: |

        aws dynamodb put-item \
          --table-name $HISTORY_TABLE \
          --item '{
            "environment":{"S":"PROD"},
            "deployment_id":{"S":"${{ github.run_id }}"},
            "git_commit":{"S":"${{ github.sha }}"},
            "status":{"S":"SUCCESS"},
            "deployment_time":{"S":"'"$(date -u +%FT%TZ)"'"}
          }'

    # =====================================================
    # Update Schema Version
    # =====================================================

    - name: Update Schema Version
      if: success()
      shell: bash
      run: |

        aws dynamodb put-item \
          --table-name $HISTORY_TABLE \
          --item '{
            "environment":{"S":"PROD"},
            "deployment_id":{"S":"SCHEMA_VERSION"},
            "git_commit":{"S":"${{ github.sha }}"},
            "status":{"S":"CURRENT"},
            "deployment_time":{"S":"'"$(date -u +%FT%TZ)"'"}
          }'

    # =====================================================
    # Create Deployment Lock
    # =====================================================

    - name: Create Deployment Lock
      if: failure()
      shell: bash
      run: |

        aws dynamodb put-item \
          --table-name $LOCK_TABLE \
          --item '{
            "environment":{"S":"PROD"},
            "status":{"S":"LOCKED"},
            "failed_commit":{"S":"${{ github.sha }}"},
            "workflow_url":{"S":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"},
            "failed_time":{"S":"'"$(date -u +%FT%TZ)"'"}
          }'

    # =====================================================
    # Remove Deployment Lock
    # =====================================================

    - name: Remove Deployment Lock
      if: success()
      shell: bash
      run: |

        aws dynamodb put-item \
          --table-name $LOCK_TABLE \
          --item '{
            "environment":{"S":"PROD"},
            "status":{"S":"UNLOCKED"},
            "resolved_time":{"S":"'"$(date -u +%FT%TZ)"'"}
          }'