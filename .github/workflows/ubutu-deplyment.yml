name: ubuntu Deployment

on:
  push:
    branches:
      - develop
      - qa
      - main


permissions:
  contents: read
  id-token: write

jobs:

  deploy-db:

    runs-on: ubuntu-latest

    environment: PROD

    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_CONNECT: "localhost:1521/XEPDB1"

    steps:

      # =====================================================
      # Checkout Repository
      # =====================================================

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::054276329279:role/github-actions-oidc-role
          aws-region: us-east-1  


      # =====================================================
      # Debug Environment Selection
      # =====================================================

      - name: Debug Environment Selection
        shell: bash
        run: |
          echo "Branch Name = ${{ github.ref_name }}"

          if [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "Matched DEV environment"
          elif [[ "${{ github.ref_name }}" == "qa" ]]; then
            echo "Matched QA environment"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "Matched PROD environment"
          else
            echo "No branch match found"
          fi

          if [[ -n "$DB_URL" ]]; then
            echo "DB_URL exists"
          else
            echo "DB_URL missing"
            exit 1
          fi


      # =====================================================
      # Validate Structural Object Modifications
      # =====================================================
      - name: Validate Structural Object Modifications
        shell: bash
        run: |
          restrictedFolders=(
            "tables/"
            "constraints/"
            "indexes/"
            "sequences/"
          )

          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            changedFiles=$(git ls-files)
          else
            changedFiles=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          fi

          while IFS= read -r file; do
            for folder in "${restrictedFolders[@]}"; do
              if [[ "$file" == *"$folder"* ]]; then
                if [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${{ github.event.before }}:$file" 2>/dev/null; then
                  echo ""
                  echo "ERROR:"
                  echo "Existing structural object modified -> $file"
                  echo ""
                  echo "Do NOT modify deployed structural objects."
                  echo "Create separate ALTER/change script instead."
                  echo ""
                  exit 1
                fi
              fi
            done
          done <<< "$changedFiles"

          echo ""
          echo "Structural object validation successful."

      # =====================================================
      # Generate release.sql From manifest.yml
      # =====================================================

      - name: Generate Differential release.sql
        shell: bash
        run: |
          manifestPath="database/app_schema/deployment/manifest.yml"
          releaseFile="release.sql"

          rm -f "$releaseFile"
          touch "$releaseFile"

          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            echo "Initial deployment detected."
            changedFiles=$(git ls-files)
          else
            changedFiles=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          fi

          echo "===== CHANGED FILES ====="
          echo "$changedFiles"

          while IFS= read -r line; do
            if [[ "$line" =~ ^[[:space:]]*-[[:space:]]*(.*) ]]; then
              manifestFile="${BASH_REMATCH[1]}"
              fullPath="database/app_schema/$manifestFile"
              if grep -Fxq "$fullPath" <<< "$changedFiles"; then
                echo "@@$fullPath" >> "$releaseFile"
                echo "Added To release.sql -> $fullPath"
              fi
            fi
          done < "$manifestPath"

          echo "===== GENERATED release.sql ====="
          cat "$releaseFile"

