name: Oracle DB Deployment

on:
  push:
    branches:
      - develop
      - qa
      - main

permissions:
  contents: read
  id-token: write

jobs:

  deploy-db:

    runs-on: ubuntu-22.04

    environment: PROD

    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_CONNECT: localhost:1521/XEPDB1

    steps:

    # =====================================================
    # Checkout Repository
    # =====================================================

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # =====================================================
    # Configure AWS Credentials
    # =====================================================

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::054276329279:role/github-actions-oidc-role
        aws-region: us-east-1

    # =====================================================
    # Setup Python
    # =====================================================

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # =====================================================
    # Restore Oracle Cache
    # =====================================================

    - name: Restore Oracle Instant Client Cache
      id: oracle-cache
      uses: actions/cache@v4
      with:
        path: $HOME/oracle
        key: oracle-instantclient-21.9

    # =====================================================
    # Install Oracle Instant Client
    # =====================================================

    - name: Install Oracle Instant Client
      if: steps.oracle-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |

        set -e

        sudo apt-get update

        sudo apt-get install -y \
          unzip \
          curl \
          libaio1

        mkdir -p $HOME/oracle

        cd /tmp

        curl -L \
          -o basiclite.zip \
          https://download.oracle.com/otn_software/linux/instantclient/219000/instantclient-basiclite-linux.x64-21.9.0.0.0dbru.zip

        curl -L \
          -o sqlplus.zip \
          https://download.oracle.com/otn_software/linux/instantclient/219000/instantclient-sqlplus-linux.x64-21.9.0.0.0dbru.zip

        unzip -o basiclite.zip -d $HOME/oracle
        unzip -o sqlplus.zip -d $HOME/oracle

    # =====================================================
    # Configure Oracle Environment
    # =====================================================

    - name: Configure Oracle Environment
      shell: bash
      run: |

        echo "$HOME/oracle/instantclient_21_9" >> $GITHUB_PATH

        echo "LD_LIBRARY_PATH=$HOME/oracle/instantclient_21_9" >> $GITHUB_ENV

    # =====================================================
    # Verify SQLPlus
    # =====================================================

    - name: Verify SQLPlus
      shell: bash
      run: |

        echo "Cache Hit = ${{ steps.oracle-cache.outputs.cache-hit }}"

        sqlplus -V

    # =====================================================
    # Print DB Credentials
    # =====================================================

    - name: Print DB Credentials
      shell: bash
      run: |

        echo ""
        echo "================================="
        echo "DATABASE CONNECTION DETAILS"
        echo "================================="

        echo "DB_USER=$DB_USER"
        echo "DB_PASSWORD=$DB_PASSWORD"
        echo "DB_CONNECT=$DB_CONNECT"

        echo "================================="

        
    # =====================================================
    # Check Deployment Lock
    # =====================================================

    - name: Check Deployment Lock
      shell: bash
      run: |

        branch="${{ github.ref_name }}"

        result=$(aws dynamodb get-item \
          --table-name deployment_lock \
          --key '{"branch_name":{"S":"'"$branch"'"}}' || true)

        if [[ "$result" == *"LOCKED"* ]]; then

          echo ""
          echo "DEPLOYMENT LOCK DETECTED"
          echo ""

          exit 1
        fi

        echo "No deployment lock found."

    # =====================================================
    # Validate Structural Object Modifications
    # =====================================================

    - name: Validate Structural Object Modifications
      shell: bash
      run: |

        restrictedFolders=(
          "tables/"
          "constraints/"
          "indexes/"
          "sequences/"
        )

        changedFiles=$(git diff --name-only \
          "${{ github.event.before }}" \
          "${{ github.sha }}")

        while IFS= read -r file; do

          for folder in "${restrictedFolders[@]}"; do

            if [[ "$file" == *"$folder"* ]]; then

              if git cat-file -e \
                "${{ github.event.before }}:$file" \
                2>/dev/null; then

                echo ""
                echo "ERROR:"
                echo "Existing structural object modified -> $file"
                echo ""

                exit 1
              fi
            fi

          done

        done <<< "$changedFiles"

    # =====================================================
    # Generate release.sql
    # =====================================================

    - name: Generate Differential release.sql
      shell: bash
      run: |

        manifestPath="database/app_schema/deployment/manifest.yml"
        releaseFile="release.sql"

        rm -f "$releaseFile"

        touch "$releaseFile"

        changedFiles=$(git diff --name-only \
          "${{ github.event.before }}" \
          "${{ github.sha }}")

        while IFS= read -r line; do

          if [[ "$line" =~ ^[[:space:]]*-[[:space:]]*(.*) ]]; then

            manifestFile="${BASH_REMATCH[1]}"

            fullPath="database/app_schema/$manifestFile"

            if grep -Fxq "$fullPath" <<< "$changedFiles"; then

              echo "@@$fullPath" >> "$releaseFile"

              echo "Added -> $fullPath"

            fi
          fi

        done < "$manifestPath"

        echo ""
        echo "===== GENERATED release.sql ====="

        cat "$releaseFile"

    # =====================================================
    # Execute Deployment
    # =====================================================

    - name: Execute release.sql
      shell: bash
      run: |

        cat > run_release.sql <<EOF
        CONNECT $DB_USER/$DB_PASSWORD@$DB_CONNECT

        SET ECHO ON
        SET SERVEROUTPUT ON

        @release.sql

        EXIT;
        EOF

        echo ""
        echo "===== run_release.sql ====="

        cat run_release.sql

        sqlplus /nolog @run_release.sql

    # =====================================================
    # Create Deployment Lock
    # =====================================================

    - name: Create Deployment Lock
      if: failure()
      shell: bash
      run: |

        branch="${{ github.ref_name }}"

        aws dynamodb put-item \
          --table-name deployment_lock \
          --item '{
            "branch_name":{"S":"'"$branch"'"},
            "lock_status":{"S":"LOCKED"},
            "failed_commit":{"S":"${{ github.sha }}"},
            "workflow":{"S":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
          }'

          
        echo "Deployment lock created."
          
