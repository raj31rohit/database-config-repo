          # =====================================================
      # Check Deployment Lock
      # =====================================================

      - name: Check Deployment Lock
        shell: bash
        run: |

          branch="${{ github.ref_name }}"

          result=$(aws dynamodb get-item \
            --table-name deployment_lock \
            --key '{"branch_name": {"S": "'"$branch"'"}}' || true)

          echo "$result"

          if [[ "$result" == *"LOCKED"* ]]; then
            echo ""
            echo "================================================="
            echo "DEPLOYMENT LOCK DETECTED"
            echo "================================================="
            echo ""
            echo "Previous deployment failed."
            echo "Manual intervention required."
            echo ""
            exit 1
          fi

          echo "No deployment lock found."

      # =====================================================
      # Execute Deployment
      # =====================================================

      - name: Execute release.sql
        shell: bash
        run: |

          @"
          cat > run_release.sql <<'EOF'
          CONNECT $DB_USER/$DB_PASSWORD@$DB_CONNECT

          SET ECHO ON
          SET SERVEROUTPUT ON

          @release.sql

          EXIT;
          EOF

          echo ""
          echo "===== run_release.sql ====="
          cat run_release.sql

          sqlplus /nolog "@run_release.sql"

      # =====================================================
      # Create Deployment Lock On Failure
      # =====================================================

      - name: Create Deployment Lock
        if: failure()
        shell: bash
        run: |
          cat > deployment.lock <<'EOF'
          =================================================
          DEPLOYMENT FAILED
          =================================================

          Branch:
          ${{ github.ref_name }}

          Commit:
          ${{ github.sha }}

          Workflow:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Partial deployment may exist.

          Manual intervention required.
          EOF

      # Create Deployment Lock
      # =====================================================

      - name: Create Deployment Lock
        if: failure()
        shell: bash
        run: |

          branch="${{ github.ref_name }}"

          aws dynamodb put-item \
            --table-name deployment_lock \
            --item '{"branch_name": {"S": "'"$branch"'"}, "lock_status": {"S": "LOCKED"}, "failed_commit": {"S": "${{ github.sha }}"}, "workflow": {"S": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}}'

          echo ""
          echo "Deployment lock created in DynamoDB."
          
