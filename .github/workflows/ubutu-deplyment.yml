name: Oracle DB Deployment

on:
  push:
    branches:
      - develop
      - qa
      - main

permissions:
  contents: read
  id-token: write

jobs:

  deploy-db:

    runs-on: ubuntu-22.04

    environment: PROD

    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_CONNECT: "localhost:1521/XEPDB1"

    steps:

      # =====================================================
      # Checkout Repository
      # =====================================================

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================
      # AWS Authentication
      # =====================================================

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::054276329279:role/github-actions-oidc-role
          aws-region: us-east-1

      # =====================================================
      # Setup Python
      # =====================================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # =====================================================
      # Install Oracle Instant Client
      # =====================================================

      - name: Install Oracle Instant Client
        shell: bash
        run: |

          sudo apt-get update

          sudo apt-get install -y \
            unzip \
            curl \
            libaio1

          mkdir -p $HOME/oracle

          cd /tmp

          curl -L \
            -o basiclite.zip \
            https://download.oracle.com/otn_software/linux/instantclient/219000/instantclient-basiclite-linux.x64-21.9.0.0.0dbru.zip

          curl -L \
            -o sqlplus.zip \
            https://download.oracle.com/otn_software/linux/instantclient/219000/instantclient-sqlplus-linux.x64-21.9.0.0.0dbru.zip

          unzip -o basiclite.zip -d $HOME/oracle
          unzip -o sqlplus.zip -d $HOME/oracle

          echo "$HOME/oracle/instantclient_21_9" >> $GITHUB_PATH

          echo "LD_LIBRARY_PATH=$HOME/oracle/instantclient_21_9" >> $GITHUB_ENV

      # =====================================================
      # Verify SQLPlus
      # =====================================================

      - name: Verify SQLPlus
        shell: bash
        run: |

          sqlplus -V

      # =====================================================
      # Check Deployment Lock
      # =====================================================

      - name: Check Deployment Lock
        shell: bash
        run: |

          branch="${{ github.ref_name }}"

          result=$(aws dynamodb get-item \
            --table-name deployment_lock \
            --key '{"branch_name":{"S":"'"$branch"'"}}' || true)

          if [[ "$result" == *"LOCKED"* ]]; then

            echo "Deployment lock detected"

            exit 1
          fi

      # =====================================================
      # Validate Structural Objects
      # =====================================================

      - name: Validate Structural Object Modifications
        shell: bash
        run: |

          echo "Structural validation logic"

      # =====================================================
      # Generate release.sql
      # =====================================================

      - name: Generate release.sql
        shell: bash
        run: |

          python database/app_schema/scripts/generate_release.py

          echo ""
          echo "===== GENERATED release.sql ====="

          cat release.sql

      # =====================================================
      # Execute Deployment
      # =====================================================

      - name: Execute release.sql
        shell: bash
        run: |

          cat > run_release.sql <<EOF
          CONNECT $DB_USER/$DB_PASSWORD@$DB_CONNECT

          SET ECHO ON
          SET SERVEROUTPUT ON

          @release.sql

          EXIT;
          EOF

          sqlplus /nolog @run_release.sql

      # =====================================================
      # Create Deployment Lock
      # =====================================================

      - name: Create Deployment Lock
        if: failure()
        shell: bash
        run: |

          branch="${{ github.ref_name }}"

          aws dynamodb put-item \
            --table-name deployment_lock \
            --item '{
              "branch_name":{"S":"'"$branch"'"},
              "lock_status":{"S":"LOCKED"},
              "failed_commit":{"S":"${{ github.sha }}"}
            }'
            
          
